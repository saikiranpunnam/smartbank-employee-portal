<!DOCTYPE html>
<html>
<head>
  <title>SmartBank Portal 🏦</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <h2>🏦 SmartBank</h2>
  <p>Admin Dashboard</p>
</div>

<div class="main">
  <div class="header">
    <h1>💼 Employee Registration</h1>
  </div>

  <div class="card">
    <h2>➕ Add Employee</h2>
    <form id="empForm">
      <input type="text" id="name" placeholder="👤 Name" required>
      <input type="email" id="email" placeholder="📧 Email" required>
      <input type="text" id="role" placeholder="💼 Role" required>
      <button type="submit">Add Employee 🚀</button>
    </form>
  </div>

  <div class="card">
    <h2>📋 Employees</h2>
    <table id="empTable">
      <thead>
        <tr>
          <th>👤 Name</th>
          <th>📧 Email</th>
          <th>💼 Role</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
